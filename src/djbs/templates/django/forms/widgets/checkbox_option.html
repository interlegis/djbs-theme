{% load djbs_extras %}
<div class="form-check{% if field.form.check_as_switch|default:field.form.model_admin.check_as_switch|default:djbs.CHECK_AS_SWITCH %} form-switch{% endif %}">
  {% include "django/forms/widgets/input.html" with djbs_form_control_class="form-check-input" %}
  <label class="form-check-label" {% if widget.attrs.id %} for="{{ widget.attrs.id }}"{% endif %}>
    {{ widget.label }}
  </label>
</div>
